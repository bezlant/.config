# Keybindings
set-option -g prefix C-a
bind-key C-a send-prefix

# Reload config
bind-key r source-file ~/.tmux.conf

# New window in current path (c) or home (C)
bind c new-window -c "#{pane_current_path}"
bind C new-window -c "$HOME"

bind-key -r h previous-window
bind-key -r l next-window
bind -r H swap-window -t :-1\; select-window -t :-1
bind -r L swap-window -t :+1\; select-window -t :+1

# Sane splits
unbind '"'
unbind '%'
bind-key v split-window -v -c "#{pane_current_path}"
bind-key s split-window -h -c "#{pane_current_path}"
bind-key -r > resize-pane -R 10
bind-key -r < resize-pane -L 10
bind-key -r + resize-pane -U 10
bind-key -r - resize-pane -D 10

bind-key o last-window

# Smart window selection: 0=first, N beyond existing=last
bind-key 0 run-shell 'tmux select-window -t :"$(tmux list-windows -F "##{window_index}" | head -1)"'
bind-key 1 run-shell 'tmux select-window -t :1 2>/dev/null || tmux select-window -t :"$(tmux list-windows -F "##{window_index}" | tail -1)"'
bind-key 2 run-shell 'tmux select-window -t :2 2>/dev/null || tmux select-window -t :"$(tmux list-windows -F "##{window_index}" | tail -1)"'
bind-key 3 run-shell 'tmux select-window -t :3 2>/dev/null || tmux select-window -t :"$(tmux list-windows -F "##{window_index}" | tail -1)"'
bind-key 4 run-shell 'tmux select-window -t :4 2>/dev/null || tmux select-window -t :"$(tmux list-windows -F "##{window_index}" | tail -1)"'
bind-key 5 run-shell 'tmux select-window -t :5 2>/dev/null || tmux select-window -t :"$(tmux list-windows -F "##{window_index}" | tail -1)"'
bind-key 6 run-shell 'tmux select-window -t :6 2>/dev/null || tmux select-window -t :"$(tmux list-windows -F "##{window_index}" | tail -1)"'
bind-key 7 run-shell 'tmux select-window -t :7 2>/dev/null || tmux select-window -t :"$(tmux list-windows -F "##{window_index}" | tail -1)"'
bind-key 8 run-shell 'tmux select-window -t :8 2>/dev/null || tmux select-window -t :"$(tmux list-windows -F "##{window_index}" | tail -1)"'
bind-key 9 run-shell 'tmux select-window -t :9 2>/dev/null || tmux select-window -t :"$(tmux list-windows -F "##{window_index}" | tail -1)"'

# Clear screen 
bind-key \\ send-keys 'C-l'

# Copy mode
bind-key Enter copy-mode

run -b 'tmux bind -t vi-copy v begin-selection 2> /dev/null || true'
run -b 'tmux bind -T copy-mode-vi v send -X begin-selection 2> /dev/null || true'
run -b 'tmux bind -t vi-copy C-v rectangle-toggle 2> /dev/null || true'
run -b 'tmux bind -T copy-mode-vi C-v send -X rectangle-toggle 2> /dev/null || true'
run -b 'tmux bind -t vi-copy y copy-selection 2> /dev/null || true'
run -b 'tmux bind -T copy-mode-vi y send -X copy-selection-and-cancel 2> /dev/null || true'
run -b 'tmux bind -t vi-copy Escape cancel 2> /dev/null || true'
run -b 'tmux bind -T copy-mode-vi Escape send -X cancel 2> /dev/null || true'
run -b 'tmux bind -t vi-copy H start-of-line 2> /dev/null || true'
run -b 'tmux bind -T copy-mode-vi H send -X start-of-line 2> /dev/null || true'
run -b 'tmux bind -t vi-copy L end-of-line 2> /dev/null || true'
run -b 'tmux bind -T copy-mode-vi L send -X end-of-line 2> /dev/null || true'

# Sessions
bind / switch-client -l
bind N command-prompt -p "New session:" "new-session -s '%%'"
bind X confirm-before -p "Kill session #S? (y/n)" kill-session

# copy to macOS clipboard
if -b 'command -v pbcopy > /dev/null 2>&1' 'bind y run -b "tmux save-buffer - | pbcopy"'
